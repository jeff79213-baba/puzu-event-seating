<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大會報到指揮所 · 座位分組系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --ink:#12172B;
    --ink-2:#1C2340;
    --ink-3:#252c4a;
    --paper:#FAF8F4;
    --paper-2:#F0ECE3;
    --amber:#F2A93B;
    --amber-dark:#C97F17;
    --slate:#5B6478;
    --teal:#1F7A6C;
    --coral:#D64550;
    --line:#E4DFD3;
    --line-dark:#333c62;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Noto Sans TC',sans-serif;background:var(--paper);color:var(--ink);}
  .mono{font-family:'JetBrains Mono',monospace;}
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;}
  input,select{font-family:inherit;}

  /* ---------- Role gate ---------- */
  #gate{min-height:100vh;display:flex;align-items:center;justify-content:center;background:
    radial-gradient(circle at 20% 20%, #1c2447 0%, var(--ink) 60%);}
  .gate-card{background:var(--ink-2);border:1px solid var(--line-dark);border-radius:16px;padding:40px 36px;max-width:440px;width:92%;color:#EDEBE3;text-align:center;box-shadow:0 30px 60px rgba(0,0,0,.35);}
  .gate-eyebrow{font-family:'JetBrains Mono',monospace;letter-spacing:.18em;font-size:12px;color:var(--amber);text-transform:uppercase;margin-bottom:10px;}
  .gate-title{font-size:26px;font-weight:900;margin:0 0 6px;}
  .gate-sub{color:#9AA1C0;font-size:14px;margin-bottom:28px;}
  .gate-btn{display:block;width:100%;padding:16px;margin-bottom:12px;border-radius:10px;border:1px solid var(--line-dark);background:var(--ink-3);color:#EDEBE3;font-size:15px;font-weight:700;transition:.15s;text-align:left;}
  .gate-btn:hover{border-color:var(--amber);background:#2a3260;}
  .gate-btn small{display:block;font-weight:400;color:#9AA1C0;font-size:12.5px;margin-top:3px;}
  .gate-pass{display:none;margin-top:14px;}
  .gate-pass input{width:100%;padding:12px;border-radius:8px;border:1px solid var(--line-dark);background:var(--ink);color:#fff;font-size:16px;text-align:center;letter-spacing:.3em;}
  .gate-pass button{margin-top:10px;width:100%;padding:12px;border-radius:8px;border:none;background:var(--amber);color:var(--ink);font-weight:700;}
  .gate-err{color:var(--coral);font-size:13px;margin-top:8px;display:none;}

  /* ---------- App shell ---------- */
  #app{display:none;min-height:100vh;}
  header.topbar{background:var(--ink);color:#EDEBE3;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;box-shadow:0 2px 12px rgba(0,0,0,.15);}
  .brand{display:flex;flex-direction:column;line-height:1.1;}
  .brand .eyebrow{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--amber);text-transform:uppercase;}
  .brand .name{font-weight:900;font-size:17px;}
  .topbar-right{display:flex;align-items:center;gap:14px;font-size:13px;color:#9AA1C0;}
  .exit-btn{background:transparent;border:1px solid var(--line-dark);color:#EDEBE3;padding:7px 14px;border-radius:8px;font-size:13px;}
  .exit-btn:hover{border-color:var(--amber);}

  nav.tabs{display:flex;gap:4px;background:var(--ink-2);padding:0 20px;overflow-x:auto;position:sticky;top:56px;z-index:39;}
  nav.tabs button{background:transparent;border:none;color:#9AA1C0;padding:14px 16px;font-size:14px;font-weight:500;border-bottom:3px solid transparent;white-space:nowrap;}
  nav.tabs button.active{color:#fff;border-bottom-color:var(--amber);font-weight:700;}

  main{max-width:1180px;margin:0 auto;padding:28px 20px 80px;}
  .panel{background:#fff;border:1px solid var(--line);border-radius:14px;padding:24px;margin-bottom:22px;}
  .panel h2{margin:0 0 4px;font-size:19px;font-weight:900;}
  .panel .desc{color:var(--slate);font-size:13.5px;margin-bottom:18px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .btn{padding:10px 18px;border-radius:9px;border:1px solid var(--line);background:var(--paper-2);color:var(--ink);font-size:14px;font-weight:700;}
  .btn:hover{border-color:var(--slate);}
  .btn-primary{background:var(--ink);color:#fff;border-color:var(--ink);}
  .btn-primary:hover{background:var(--ink-2);}
  .btn-amber{background:var(--amber);border-color:var(--amber-dark);color:var(--ink);}
  .btn-amber:hover{background:var(--amber-dark);color:#fff;}
  .btn-ghost{background:transparent;}
  .btn-danger{color:var(--coral);border-color:#f0c9cc;background:#fff5f5;}
  .btn-sm{padding:6px 10px;font-size:12.5px;border-radius:7px;}
  input[type=text],input[type=number],input[type=tel],select{padding:9px 11px;border-radius:8px;border:1px solid var(--line);font-size:14px;background:#fff;}
  label.field{display:flex;flex-direction:column;gap:5px;font-size:12.5px;color:var(--slate);font-weight:700;}

  /* dashboard stat cards */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;}
  .stat-card{background:var(--ink);color:#fff;border-radius:12px;padding:18px;position:relative;overflow:hidden;}
  .stat-card .label{font-size:11.5px;color:#9AA1C0;text-transform:uppercase;letter-spacing:.08em;font-family:'JetBrains Mono',monospace;}
  .stat-card .num{font-family:'JetBrains Mono',monospace;font-size:34px;font-weight:700;color:var(--amber);margin-top:4px;}
  .stat-card .sub{font-size:12px;color:#9AA1C0;margin-top:2px;}

  /* table */
  table.data{width:100%;border-collapse:collapse;font-size:13.5px;}
  table.data th{text-align:left;color:var(--slate);font-size:12px;text-transform:uppercase;letter-spacing:.05em;padding:8px 10px;border-bottom:2px solid var(--line);}
  table.data td{padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:middle;}
  table.data tr:hover td{background:var(--paper-2);}
  .chip{display:inline-block;padding:2px 9px;border-radius:100px;font-size:12px;font-weight:700;background:var(--paper-2);color:var(--ink);}
  .chip.empty{color:var(--slate);background:transparent;border:1px dashed var(--line);}
  .pager{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:14px;font-size:13px;color:var(--slate);}

  /* assignment tiles */
  .cat-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .cat-tab{padding:9px 16px;border-radius:100px;border:1px solid var(--line);background:#fff;font-size:13.5px;font-weight:700;color:var(--slate);}
  .cat-tab.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .tile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;}
  .tile{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff;}
  .tile-head{background:var(--ink);color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
  .tile-head .num{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--amber);}
  .tile-head .cnt{font-size:11.5px;color:#9AA1C0;}
  .tile-body{padding:6px 10px;overflow:visible;}
  .tile-row{display:grid;grid-template-columns:1fr 1fr;gap:2px 12px;}
  .tile-person{display:flex;align-items:center;padding:5px 4px;border-bottom:1px dashed var(--line);font-size:12.5px;gap:2px;}
  .tile-person:last-child{border-bottom:none;}
  .tile-person .tp-name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
  .tile-person .tp-org{color:var(--slate);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
  .tile-person .tp-assign{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;margin-left:auto;white-space:nowrap;}
  .tile-person select{font-size:11px;padding:2px 4px;border-radius:5px;margin-left:auto;}
  .pending-badge{display:inline-block;background:var(--coral);color:#fff;font-size:10px;padding:1px 7px;border-radius:100px;font-weight:700;}
  @keyframes flip{0%{transform:scaleY(1);}50%{transform:scaleY(0.05);}100%{transform:scaleY(1);}}
  .flip{animation:flip .35s ease;}

  /* lookup */
  .lookup-wrap{max-width:480px;margin:40px auto;}
  .lookup-card{background:var(--ink);color:#fff;border-radius:16px;padding:30px;text-align:center;}
  .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:22px;}
  .result-tile{background:var(--ink-2);border:1px solid var(--line-dark);border-radius:10px;padding:16px 10px;}
  .result-tile .k{font-size:11.5px;color:#9AA1C0;font-family:'JetBrains Mono',monospace;letter-spacing:.08em;}
  .result-tile .v{font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:700;color:var(--amber);margin-top:4px;}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 22px;border-radius:10px;font-size:14px;z-index:200;box-shadow:0 10px 30px rgba(0,0,0,.3);opacity:0;transition:.25s;pointer-events:none;}
  .toast.show{opacity:1;}
  .toast.err{background:var(--coral);}
  .toast.ok{background:var(--teal);}

  .empty-state{text-align:center;padding:50px 20px;color:var(--slate);}
  .empty-state .big{font-size:40px;margin-bottom:8px;}

  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;}
  @media(max-width:640px){
    .result-grid{grid-template-columns:1fr 1fr;}
    main{padding:18px 12px 60px;}
    .panel{padding:16px;}
  }
</style>
</head>
<body>

<div id="gate">
  <div class="gate-card">
    <div class="gate-eyebrow">Event Ops · 大會座位系統</div>
    <h1 class="gate-title">報到指揮所</h1>
    <div class="gate-sub">請選擇你的身分進入系統</div>
    <button class="gate-btn" id="btnStaff">工作人員 / 主辦方後台<small>匯入名單、產生座位分組、匯出名單</small></button>
    <div class="gate-pass" id="passBox">
      <div style="display:flex;gap:6px;align-items:stretch;">
        <input type="password" id="passInput" maxlength="8" placeholder="輸入通關密碼" inputmode="numeric" style="flex:1;padding:16px 14px;border-radius:10px;border:1px solid var(--line-dark);background:var(--ink);color:#fff;font-size:18px;text-align:center;letter-spacing:.15em;">
        <button id="passToggle" type="button" style="background:var(--ink-3);border:1px solid var(--line-dark);border-radius:10px;color:#9AA1C0;font-size:22px;padding:0 16px;cursor:pointer;">👁️</button>
      </div>
      <button id="passSubmit">進入後台</button>
      <div class="gate-err" id="passErr">密碼錯誤,請再試一次</div>
    </div>
    <button class="gate-btn" id="btnPublic">與會者 / 我要查我的座位<small>輸入姓名 + 電話末4碼即可查詢</small></button>
  </div>
</div>

<div id="app">
  <header class="topbar">
    <div class="brand">
      <div class="eyebrow">Event Ops</div>
      <div class="name" id="brandName">大會報到指揮所</div>
    </div>
    <div class="topbar-right">
      <span id="roleLabel"></span>
      <button class="exit-btn" id="btnExit">切換身分</button>
    </div>
  </header>
  <nav class="tabs" id="tabs"></nav>
  <main id="main"></main>
</div>

<div class="toast" id="toast"></div>

<script>
/* ================= STATE ================= */
const CATS = [
  {key:'course', label:'課程座位', unit:'區', sizeKey:'courseSize', isCourse:true},
  {key:'meal',   label:'吃飯座位', unit:'桌', sizeKey:'mealSize'},
  {key:'room',   label:'房間',     unit:'房', sizeKey:'roomCapacity'},
  {key:'activity',label:'分組活動',unit:'組', sizeKey:'activitySize'},
];
const STORAGE_KEY = 'seatplan_attendees_v3';
const SETTINGS_KEY = 'seatplan_settings_v3';

let state = {
  role: null, // 'admin' | 'public'
  attendees: [],
  settings: {
    eventName: '大會報到指揮所',
    passcode: '0000',
    orgs: ['組織A', '組織B', '組織C'],
    courseColors: ['紅', '黃', '藍', '綠'],
    courseRowSize: 30,
    seatDirection: 'left-to-right',
    seatNumbering: 'same',
    mealSize: 10,
    roomCapacity: 4,
    activitySize: 10,
    roomSameGender: true,
    roomNumbers: []
  },
  tab: 'dashboard',
  assignCat: 'course',
  assignFilterOrg: '',
  listSearch: '',
  listPage: 1,
  editId: null,
  loaded: false
};

/* ================= STORAGE HELPERS ================= */
async function loadAll(){
  try{
    const r = await window.storage.get(STORAGE_KEY, true);
    state.attendees = r ? JSON.parse(r.value) : [];
  }catch(e){ state.attendees = []; }
  try{
    const r = await window.storage.get(SETTINGS_KEY, true);
    if(r) state.settings = Object.assign({}, state.settings, JSON.parse(r.value));
  }catch(e){ /* use defaults */ }
  state.loaded = true;
}
async function saveAttendees(){
  try{ await window.storage.set(STORAGE_KEY, JSON.stringify(state.attendees), true); }
  catch(e){ toast('儲存失敗,請檢查網路後重試', 'err'); }
}
async function saveSettings(){
  try{ await window.storage.set(SETTINGS_KEY, JSON.stringify(state.settings), true); }
  catch(e){ toast('設定儲存失敗', 'err'); }
}

/* ================= UTIL ================= */
function uid(){ return 'a' + Math.random().toString(36).slice(2,10); }
function toast(msg, type){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' '+type : '');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>{ t.className='toast'; }, 2600);
}
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function downloadCSV(filename, rows){
  const csv = rows.map(r=>r.map(v=>{
    v = v==null? '' : String(v);
    if(/[",\n]/.test(v)) v = '"'+v.replace(/"/g,'""')+'"';
    return v;
  }).join(',')).join('\r\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
}

/* ================= ASSIGNMENT ALGORITHM ================= */
function chunkBySize(arr, size){
  const groups = [];
  for(let i=0; i<arr.length; i+=size) groups.push(arr.slice(i, i+size));
  return groups;
}
function parseRoomRanges(input){
  // Format: "4:5001~5066, 2:2011~2033, 7077~7088, 9022, 9033" etc.
  // Returns array of {room:string, capacity:number}
  const result = [];
  const defaultCapacity = state.settings.roomCapacity || 4;
  input.split(',').forEach(part=>{
    part = part.trim();
    if(!part) return;
    let capacity = defaultCapacity;
    let rangeStr = part;
    // Check for capacity prefix like "4:5001~5066" or "雙人房:2011~2033"
    const capMatch = part.match(/^(\d+|[^\d~\-]+?)\s*[:：]\s*(.+)$/);
    if(capMatch){
      const prefix = capMatch[1].trim();
      rangeStr = capMatch[2].trim();
      if(/^\d+$/.test(prefix)) capacity = parseInt(prefix);
      else if(prefix.includes('雙')||prefix.includes('2人')||prefix.includes('二人')) capacity = 2;
      else if(prefix.includes('四')||prefix.includes('4人')||prefix.includes('四人')) capacity = 4;
      else if(prefix.includes('單')||prefix.includes('1人')||prefix.includes('一人')) capacity = 1;
      else if(prefix.includes('六')||prefix.includes('6人')||prefix.includes('六人')||prefix.includes('大')) capacity = 6;
    }
    const m = rangeStr.match(/^(\d+)\s*[~\-]\s*(\d+)$/);
    if(m){
      const start = parseInt(m[1]), end = parseInt(m[2]);
      for(let n=start; n<=end; n++) result.push({room:String(n), capacity});
    } else {
      result.push({room:rangeStr, capacity});
    }
  });
  return result;
}

function generateAssignment(catKey){
  const s = state.settings;
  const people = state.attendees;
  if(people.length===0){ toast('尚未有名單資料', 'err'); return; }

  if(catKey==='course'){ generateCourseAssignment(); return; }

  // Preserve existing manual assignments – only assign unassigned people
  const existingGroups = [...new Set(people.map(p=>p.assign[catKey]).filter(v=>v!=null))].sort((a,b)=>a-b);
  let globalCounter = existingGroups.length ? Math.max(...existingGroups) + 1 : 1;

  const unassigned = people.filter(p=>!p.assign[catKey]);
  if(unassigned.length===0){ toast('所有人員都已分配完畢', 'ok'); return; }

  const allGroups = [];

  if(catKey==='room'){
    // Staff auto-assign within unassigned only
    const staffPeople = unassigned.filter(p=>p.staff);
    const normalPeople = unassigned.filter(p=>!p.staff);
    if(staffPeople.length>0){
      const staffGroups = chunkBySize(staffPeople, s.roomCapacity);
      staffGroups.forEach(grp=>{
        grp.forEach(p=>{ p.assign.room = globalCounter; });
        allGroups.push(grp);
        globalCounter++;
      });
    }
    // Now normal people by org
    const orgMap = {};
    normalPeople.forEach(p=>{ const k=p.org||'未指定'; (orgMap[k]=orgMap[k]||[]).push(p); });
    Object.keys(orgMap).forEach(org=>{
      const sub = orgMap[org];
      if(s.roomSameGender){
        ['M','F','其他'].forEach(g=>{
          const gPeople = sub.filter(p=>(p.gender||'其他')===g);
          if(gPeople.length===0) return;
          const groups = chunkBySize(gPeople, s.roomCapacity);
          groups.forEach((grp, i)=>{
            if(grp.length===s.roomCapacity || i<groups.length-1){
              grp.forEach(p=>{ p.assign.room = globalCounter; });
              allGroups.push(grp);
              globalCounter++;
            }
          });
        });
      } else {
        const groups = chunkBySize(sub, s.roomCapacity);
        groups.forEach((grp, i)=>{
          if(grp.length===s.roomCapacity || i<groups.length-1){
            grp.forEach(p=>{ p.assign.room = globalCounter; });
            allGroups.push(grp);
            globalCounter++;
          }
        });
      }
    });
  } else if(catKey==='meal'){
    const vegPeople = [], nonVegMap = {};
    unassigned.forEach(p=>{
      const k=p.org||'未指定';
      if(p.diet==='素') vegPeople.push(p);
      else { (nonVegMap[k]=nonVegMap[k]||[]).push(p); }
    });
    Object.keys(nonVegMap).forEach(org=>{
      const groups = chunkBySize(nonVegMap[org], s.mealSize);
      groups.forEach((grp, i)=>{
        if(grp.length===s.mealSize || i<groups.length-1){
          grp.forEach(p=>{ p.assign.meal = globalCounter; });
          allGroups.push(grp);
          globalCounter++;
        }
      });
    });
    if(vegPeople.length>0){
      const groups = chunkBySize(vegPeople, s.mealSize);
      groups.forEach(grp=>{
        grp.forEach(p=>{ p.assign.meal = globalCounter; });
        allGroups.push(grp);
        globalCounter++;
      });
    }
  } else if(catKey==='activity'){
    // Activity: only unassigned people, group by sponsor within org
    const orgMap = {};
    unassigned.forEach(p=>{ const k=p.org||'未指定'; (orgMap[k]=orgMap[k]||[]).push(p); });
    Object.keys(orgMap).forEach(org=>{
      const sub = orgMap[org];
      const sponsorMap = {};
      sub.forEach(p=>{
        const sp = p.sponsor || '';
        if(!sp) return;
        (sponsorMap[sp] = sponsorMap[sp] || []).push(p);
      });
      Object.keys(sponsorMap).forEach(sp=>{
        const spGroup = sponsorMap[sp];
        if(spGroup.length <= s.activitySize){
          spGroup.forEach(p=>{ p.assign.activity = globalCounter; });
          allGroups.push(spGroup);
          globalCounter++;
        } else {
          const groups = chunkBySize(spGroup, s.activitySize);
          groups.forEach((grp, i)=>{
            if(i<groups.length-1){
              grp.forEach(p=>{ p.assign.activity = globalCounter; });
              allGroups.push(grp);
              globalCounter++;
            }
          });
        }
      });
    });
    // Remaining after sponsor-based → pending
    const stillUnassigned = unassigned.filter(p=>!p.assign.activity);
    if(stillUnassigned.length>0){
      toast(`⚠️ ${stillUnassigned.length} 人無上線夥伴或剩員，已保留在待分配區`, '');
    }
  } else {
    // Generic fallback
    const groups = chunkBySize(unassigned, s.mealSize);
    groups.forEach(grp=>{
      grp.forEach(p=>{ p.assign[catKey] = globalCounter; });
      allGroups.push(grp);
      globalCounter++;
    });
  }

  // ---- Handle remaining (meal/room) ----
  if(catKey==='meal' || catKey==='room'){
    const stillUnassigned = unassigned.filter(p=>!p.assign[catKey]);
    if(stillUnassigned.length>0){
      const groups = chunkBySize(stillUnassigned, catKey==='room'?s.roomCapacity:s.mealSize);
      groups.forEach(grp=>{
        grp.forEach(p=>{ p.assign[catKey] = globalCounter; });
        allGroups.push(grp);
        globalCounter++;
      });
      toast(`⚠️ ${stillUnassigned.length} 人跨組織合併`, '');
    }
  }

  // ---- Assign actual room numbers if configured ----
  if(catKey==='room' && s.roomNumbers && s.roomNumbers.length>0){
    const gro = {};
    people.forEach(p=>{ if(p.assign.room){ (gro[p.assign.room] = gro[p.assign.room] || []).push(p); } });
    const sortedGroups = Object.keys(gro).map(Number).sort((a,b)=>a-b);
    let roomIdx = 0;
    sortedGroups.forEach(g=>{
      const count = (gro[g]||[]).length;
      // Find first remaining room that fits the group size
      for(let r = roomIdx; r < s.roomNumbers.length; r++){
        if(s.roomNumbers[r].capacity >= count){
          (gro[g]||[]).forEach(p=>{ p.assign.roomNumber = s.roomNumbers[r].room; });
          roomIdx = r + 1;
          return;
        }
      }
      // If no room fits, try from start (reuse rooms)
      for(let r = 0; r < roomIdx; r++){
        if(s.roomNumbers[r].capacity >= count){
          (gro[g]||[]).forEach(p=>{ p.assign.roomNumber = s.roomNumbers[r].room; });
          return;
        }
      }
    });
  }

  saveAttendees();
  const assigned = unassigned.filter(p=>p.assign[catKey]).length;
  toast(`已完成 ${assigned} 人分配` + (existingGroups.length>0 ? `（保留 ${existingGroups.length} 組既有分配）` : ''), 'ok');
  render();
}

function generateCourseAssignment(){
  const s = state.settings;
  const people = state.attendees;
  if(people.length===0){ toast('尚無名單', 'err'); return; }
  people.forEach(p=>{ p.assign.courseSection=null; p.assign.courseSeat=null; });

  const sectionCount = s.courseColors.length;
  // assign sections round-robin
  people.forEach((p,i)=>{
    p.assign.courseSection = i % sectionCount;
  });

  // assign seats per section
  for(let sec=0; sec<sectionCount; sec++){
    const secPeople = people.filter(p=>p.assign.courseSection===sec);
    const rowSize = s.courseRowSize;
    let seatNum = 1;
    const groups = chunkBySize(secPeople, rowSize);
    groups.forEach((row, ri)=>{
      if(s.seatNumbering==='snake' && ri%2===1){
        // snake: reverse order for this row
        const rev = [...row].reverse();
        rev.forEach(p=>{ p.assign.courseSeat = seatNum++; });
      } else {
        row.forEach(p=>{ p.assign.courseSeat = seatNum++; });
      }
    });
  }

  saveAttendees();
  toast('已完成課程座位分配', 'ok');
  render();
}

function matchAttendee(row, orgHint){
  const norm = {};
  Object.keys(row).forEach(k=>{ norm[k.trim()] = row[k]; });
  const find = (arr)=>{
    for(const k of Object.keys(norm)){
      if(arr.some(w=>k.includes(w))) return (norm[k]||'').toString().trim();
    }
    return '';
  };
  const rawPhone = find(['手機','電話','phone','mobile']);
  const rawStaff = find(['工作人員','職務','角色','staff','role']);
  return {
    name: find(['姓名','name']),
    org: orgHint || find(['組織','單位','公司','部門','org','dept']),
    gender: normalizeGender(find(['性別','gender'])),
    sponsor: find(['上線夥伴','上線','推薦人','sponsor','upline']),
    phone: rawPhone,
    phone4: rawPhone.slice(-4),
    diet: normalizeDiet(find(['葷素','飲食','diet','food'])),
    staff: rawStaff
  };
}
function normalizeGender(v){
  v = (v||'').trim();
  if(['男','M','m','Male','male'].includes(v)) return 'M';
  if(['女','F','f','Female','female'].includes(v)) return 'F';
  return v ? '其他' : '';
}
function normalizeDiet(v){
  v = (v||'').trim();
  if(['素','素食','vegetarian','vegan','V'].includes(v)) return '素';
  return '葷';
}

    {names:['藍','藍色','blue'], hex:'#3B6FA0'},

    {names:['紫','紫色','purple'], hex:'#7B4EA0'},
    {names:['橙','橙色','橘','橘色','orange'], hex:'#E8843A'},
    {names:['粉','粉紅','粉红色','pink'], hex:'#E87A90'},
    {names:['棕','棕色','咖啡','brown'], hex:'#8B6A4A'},
    {names:['灰','灰色','gray','grey'], hex:'#7B8494'},
    {names:['白','白色','white'], hex:'#D0D0D0'},
    {names:['黑','黑色','black'], hex:'#3A3A3A'},
  ];
  const name = state.settings.courseColors[idx] || '';
  for(const p of palette){

  document.getElementById('btnGenerate').onclick = ()=>{
    if(!confirm('將自動分配尚未安排的人員。已手動分配者不受影響，確定繼續嗎?')) return;
    if(cat.isCourse){
      s.courseRowSize = parseInt(document.getElementById('sizeInput').value) || s.courseRowSize;
      s.seatDirection = document.getElementById('seatDirection').value;
      s.seatNumbering = document.getElementById('seatNumbering').value;
    } else {
      const sizeInput = parseInt(document.getElementById('sizeInput').value) || sizeVal;
      if(cat.key==='room'){
        s.roomCapacity = sizeInput;
        s.roomSameGender = document.getElementById('sameGenderChk')?.checked || false;
      } else if(cat.key==='activity'){
        s.activitySize = sizeInput;
      } else {
        s[cat.sizeKey] = sizeInput;
      }
    }
    saveSettings();
    generateAssignment(cat.key);
  };
  document.getElementById('btnExportCat').onclick = ()=>{
    const label = cat.label;
    const rows = [['姓名','組織','性別','手機','上線夥伴','葷素','工作人員', label]];
    state.attendees.forEach(p=> {
      let v = '';
      if(cat.isCourse) v = p.assign.courseSection!=null ? getSectionLabel(p.assign.courseSection)+'-'+p.assign.courseSeat : '';
      else v = p.assign[cat.key] ? cat.unit+p.assign[cat.key] : '';
      rows.push([p.name,p.org,genderLabel(p.gender),p.phone,p.sponsor,p.diet,p.staff||'', v]);
    });
    downloadCSV(label+'名單.csv', rows);
  };

  // Pre-assign: apply manual group numbers
  const applyBtn = document.getElementById('applyPreassign');
  if(applyBtn) applyBtn.onclick = ()=>{
    let count = 0;
    document.querySelectorAll('.preassign-input').forEach(inp=>{
      const val = inp.value.trim();
      if(!val) return;
      const p = state.attendees.find(a=>a.id===inp.getAttribute('data-pid'));
      if(p){ p.assign[cat.key] = parseInt(val); count++; }
    });
    if(count>0){ saveAttendees(); toast(`已設定 ${count} 人`, 'ok'); render(); }
    else toast('請先輸入 '+cat.unit+'號', '');
  };

  // move person to another group
  main.querySelectorAll('[data-move]').forEach(sel=>sel.onchange=()=>{
    const p = state.attendees.find(a=>a.id===sel.dataset.move);
    if(sel.value==='pending'){
      p.assign[cat.key] = null;
    } else {
      p.assign[cat.key] = parseInt(sel.value);
    }
    saveAttendees();
    render();
  });
  // pending move
  main.querySelectorAll('[data-pending-move]').forEach(sel=>sel.onchange=()=>{
    const p = state.attendees.find(a=>a.id===sel.dataset.move);
    if(sel.value==='new'){
      const maxG = Math.max(0, ...state.attendees.map(a=>a.assign.activity||0));
      p.assign.activity = maxG+1;
    } else if(sel.value){
      p.assign.activity = parseInt(sel.value);
    }
    saveAttendees();
    render();
  });
  // activity room save
  const saveRooms = document.getElementById('saveActivityRooms');
  if(saveRooms) saveRooms.onclick = ()=>{

      const gi = parseInt(inp.dataset.group);

      (groupsMap[gi]||[]).forEach(p=>{ p.assign.activityRoom = roomNum || null; });
    });
    saveAttendees();
    toast('房號已儲存', 'ok');
    render();
  };
}

function renderCourseSections(){
  const s = state.settings;
  const attendees = state.attendees.filter(p=>p.assign.courseSection!=null);
  let html = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;">';
  for(let sec=0; sec<s.courseColors.length; sec++){
    const color = getSectionColor(sec);
    const label = getSectionLabel(sec);
    const members = attendees.filter(p=>p.assign.courseSection===sec).sort((a,b)=>a.assign.courseSeat-b.assign.courseSeat);
    const totalSeats = Math.max(...members.map(p=>p.assign.courseSeat||0), 0);
    const rowSize = s.courseRowSize;
    const rows = [];
    members.forEach(p=>{
      const rowIdx = Math.floor((p.assign.courseSeat-1) / rowSize);
      if(!rows[rowIdx]) rows[rowIdx]=[];
      rows[rowIdx].push(p);
    });
    html += `<div style="border:3px solid ${color};border-radius:14px;overflow:hidden;background:#fff;">
      <div style="background:${color};color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;">
        <span style="font-weight:900;font-size:20px;">${label}區</span>
        <span style="font-size:13px;opacity:.9;">共 ${members.length} 席</span>
      </div>
      <div style="padding:14px;max-height:500px;overflow-y:auto;">
        ${rows.map((row,ri)=>`
          <div style="margin-bottom:8px;">
            <div style="font-size:11px;color:var(--slate);font-family:'JetBrains Mono',monospace;margin-bottom:4px;padding-left:4px;">第${ri+1}排</div>
            <div style="display:grid;grid-template-columns:repeat(${Math.min(rowSize,6)},1fr);gap:3px;">
              ${row.map(p=>`
                <div style="background:${color}15;border:1px solid ${color}40;border-radius:6px;padding:4px 3px;text-align:center;font-size:11px;line-height:1.2;">
                  <div style="font-weight:700;">${esc(p.name)}</div>
                  <div style="color:var(--slate);font-size:9px;">${p.assign.courseSeat}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
  }
  html += '</div>';
  return html;
}

    const p = matches[0];
    box.innerHTML = `
      <div style="margin-top:6px;font-size:14px;color:#9AA1C0;">${esc(p.name)} ・ ${esc(p.org)||''} ・ ${esc(p.sponsor)||''}</div>
      <div class="result-grid">
        ${CATS.map(c=>{
          if(c.isCourse){
            const v = p.assign.courseSection!=null ? getSectionLabel(p.assign.courseSection)+'區-'+p.assign.courseSeat+'號' : '待公布';
            return `<div class="result-tile"><div class="k">${c.label}</div><div class="v">${v}</div></div>`;
          }
          if(c.key==='activity'){
            const gn = p.assign.activity ? '組'+p.assign.activity : '待公布';
            const rn = p.assign.activityRoom || p.assign.room || '';
            return `<div class="result-tile"><div class="k">${c.label}</div><div class="v">${gn}${rn?' / 房'+rn:''}</div></div>`;
          }
          if(c.key==='room'){
            const rn = p.assign.roomNumber || p.assign.room || '';
            return `<div class="result-tile"><div class="k">${c.label}</div><div class="v">${rn?'房'+rn:'待公布'}</div></div>`;
          }
          return `<div class="result-tile"><div class="k">${c.label}</div><div class="v">${p.assign[c.key]?c.unit+p.assign[c.key]:'待公布'}</div></span></div>`;
        }).join('')}
      </div>
    `;
  };
}

/* ================= GATE / BOOT ================= */
document.getElementById('btnStaff').onclick = ()=>{ document.getElementById('passBox').style.display='block'; };
document.getElementById('passToggle').onclick = ()=>{
  const inp = document.getElementById('passInput');
  inp.type = inp.type==='password' ? 'text' : 'password';
  document.getElementById('passToggle').textContent = inp.type==='password' ? '👁️' : '🙈';
};
document.getElementById('passSubmit').onclick = ()=> tryEnterAdmin();
document.getElementById('passInput').addEventListener('keydown', e=>{ if(e.key==='Enter') tryEnterAdmin(); });
function tryEnterAdmin(){
  const val = document.getElementById('passInput').value.trim();
  if(val === state.settings.passcode){
    enterApp('admin');
  } else {
    document.getElementById('passErr').style.display='block';
  }
}
document.getElementById('btnPublic').onclick = ()=> enterApp('public');
document.getElementById('btnExit').onclick = ()=>{
  document.getElementById('app').style.display='none';
  document.getElementById('gate').style.display='flex';
  document.getElementById('passBox').style.display='none';
  document.getElementById('passErr').style.display='none';
  document.getElementById('passInput').value='';
};
function enterApp(role){
  state.role = role;
  state.tab = role==='admin' ? 'dashboard' : 'lookup';
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
  render();
}

(async function boot(){
  await loadAll();
})();
</script>
</body>
</html>
